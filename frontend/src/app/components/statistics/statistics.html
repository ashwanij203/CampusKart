<section class="stats-section">
  <!-- Ambient orbs -->
  <div class="stats-orb orb-a"></div>
  <div class="stats-orb orb-b"></div>

  <div class="stats-inner">
    <p class="section-eyebrow">By The Numbers</p>
    <h2 class="section-heading">Trusted by Thousands of LPU Students</h2>
    <p class="section-subheading">
      CampusKart makes buying and selling easier, safer and faster — right on campus.
    </p>

    <div class="stats-grid">
      @for(stat of stats; track stat.title){
        <div class="stat-card">
          <div class="stat-icon-wrap">
            <i class="bi" [class]="stat.icon"></i>
          </div>
          <div class="stat-value">{{ stat.value }}</div>
          <p class="stat-label">{{ stat.title }}</p>
        </div>
      }
    </div>
  </div>
</section>
