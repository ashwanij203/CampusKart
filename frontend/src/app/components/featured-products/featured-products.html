<section class="fp-section">
  <div class="fp-header">
    <h2 class="fp-title">Featured Products</h2>
    <p class="fp-subtitle">Latest listings from verified LPU students</p>
    <a routerLink="/products" class="fp-viewall">View All <i class="bi bi-arrow-right"></i></a>
  </div>
  <div class="fp-grid">
    @for(product of products; track product.id){
      <app-product-card [product]="product"></app-product-card>
    }
  </div>
</section>
