<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>CampusKart – Buy & Sell at LPU</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="CampusKart – The campus marketplace to buy and sell products at LPU. Find books, electronics, gadgets and more from fellow students.">
  <!-- New CampusKart Favicon -->
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="favicon.png">
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- Load saved theme before render to avoid flash -->
  <script>
    (function() {
      const theme = localStorage.getItem('ck-theme') || 'light';
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
</head>
<body>
  <app-root></app-root>
</body>
</html>
