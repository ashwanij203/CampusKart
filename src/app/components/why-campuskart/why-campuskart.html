<section class="why">
    <h2>Why Choose CampusKart?</h2>
    <div class="feature-grid">
        @for(feature of features; track feature.title){
            <div class="feature-card">
                <div class="icon">
                    {{feature.icon}}
                </div>
                <h3>
                    {{feature.title}}
                </h3>
                <p>
                    {{feature.description}}
                </p>
            </div>
        }
    </div>
</section>
